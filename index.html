<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Imrano Tech | Duka la Elektroniki</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .products { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>Bidhaa Zetu</h1>
    <div id="product-list" class="products">
        <p>Inapakia bidhaa...</p>
    </div>
    
    <script>
        // Hapa ndipo mfumo utakapovuta bidhaa zako kutoka folder la 'products'
        fetch('./products/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('product-list').innerHTML = "<h3>Karibu kwenye duka letu! Ongeza bidhaa kupitia Admin Panel.</h3>";
            });
    </script>
</body>
</html>
