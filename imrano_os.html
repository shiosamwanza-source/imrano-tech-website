<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imrano WebOS & Store</title>
    <style>
        /* --- MWONEKANO WA OPERATING SYSTEM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #desktop {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            position: relative;
            overflow: hidden;
        }

        /* Desktop Icons */
        .desktop-icon {
            position: absolute;
            color: white;
            text-align: center;
            cursor: pointer;
            width: 80px;
            margin: 20px;
        }
        .desktop-icon span { display: block; margin-top: 5px; font-size: 12px; text-shadow: 1px 1px 2px black; }

        /* Taskbar */
        #taskbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        #start-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #clock {
            color: white;
            margin-left: auto;
            padding-right: 20px;
            font-family: monospace;
        }

        /* Window (Dirisha la Programu) */
        .window {
            position: absolute;
            width: 600px;
            height: 400px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            top: 50px;
            left: 200px;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .title-bar {
            background: #ddd;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }
        .close-btn { background: red; color: white; border: none; cursor: pointer; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 18px; }
        .window-content { flex: 1; padding: 15px; overflow-y: auto; }

        /* --- MWONEKANO WA ONLINE STORE --- */
        .store-header { background: #ff9800; color: white; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 15px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .product-card { border: 1px solid #ccc; padding: 10px; text-align: center; border-radius: 5px; }
        .product-card img { width: 100%; height: 80px; object-fit: cover; margin-bottom: 5px; }
        .product-card button { background: #4CAF50; color: white; border: none; padding: 5px; width: 100%; cursor: pointer; border-radius: 3px; }
        .product-card button:hover { background: #45a049; }
        #cart-message { margin-top: 15px; color: green; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="desktop">
    <!-- IKONI ZA DESKTOP -->
    <div class="desktop-icon" ondblclick="openStore()">
        🛒<br><span>Imrano Store</span>
    </div>
    <div class="desktop-icon" ondblclick="alert('Karibu Imrano OS!')">
        💻<br><span>My Computer</span>
    </div>

    <!-- DIRISHA LA ONLINE STORE -->
    <div class="window" id="store-window">
        <div class="title-bar">
            <span>Imrano Online Store</span>
            <button class="close-btn" onclick="closeStore()">X</button>
        </div>
        <div class="window-content">
            <div class="store-header">
                <h2>Karibu Kwenye Duka la Imrano</h2>
                <p>Pata bidhaa bora kwa bei nafuu!</p>
            </div>
            
            <div class="product-grid" id="product-list">
                <!-- Bidhaa zitawekwa hapa kwa kutumia JavaScript -->
            </div>
            <div id="cart-message"></div>
        </div>
    </div>

    <!-- TASKBAR -->
    <div id="taskbar">
        <button id="start-btn" onclick="openStore()">🪟 Imrano</button>
        <div id="clock"></div>
    </div>
</div>

<script>
    // --- SAA YA OS ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    // --- FUNKSIONI ZA KUFUNGUA NA KUFUNGA DIRISHA (OS) ---
    function openStore() {
        document.getElementById('store-window').style.display = 'flex';
        loadProducts();
    }
    function closeStore() {
        document.getElementById('store-window').style.display = 'none';
    }

    // --- LOGIC YA ONLINE STORE ---
    // Hii ni data ya bidhaa (kwa sasa hardcoded, baadaye unaweza kuituma kwenye database)
    const products = [
        { id: 1, name: "Laptop HP", price: 450000, img: "💻" },
        { id: 2, name: "Mouse Wireless", price: 15000, img: "🖱️" },
        { id: 3, name: "Keyboard", price: 25000, img: "⌨️" },
        { id: 4, name: "Headset", price: 35000, img: "🎧" }
    ];

    function loadProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = ''; // Futa ili usirudie
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            // Kuunda HTML ya kadi ya bidhaa
            card.innerHTML = `
                <div style="font-size: 40px;">${product.img}</div>
                <h3>${product.name}</h3>
                <p>TSh ${product.price.toLocaleString()}</p>
                <button onclick="addToCart('${product.name}')">Nunua Sasa</button>
            `;
            list.appendChild(card);
        });
    }

    function addToCart(productName) {
        const msgDiv = document.getElementById('cart-message');
        msgDiv.innerText = `✅ ${productName} imeongezwa kwenye kikapu!`;
        
        // Futa ujumbe baada ya sekunde 3
        setTimeout(() => {
            msgDiv.innerText = '';
        }, 3000);
    }
</script>

</body>
</html>
